spring.application.name=mosquee
server.port=${PORT:8080}

# Base de données — H2 local, PostgreSQL en prod
spring.datasource.url=${DATABASE_URL:jdbc:h2:file:./data/alkaram;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Compte admin — valeurs définies dans les variables d'environnement
admin.username=${ADMIN_USERNAME}
admin.password=${ADMIN_PASSWORD}

# Stripe — valeurs définies dans les variables d'environnement
stripe.public.key=${STRIPE_PUBLIC_KEY}
stripe.secret.key=${STRIPE_SECRET_KEY}

# URL de base
app.base.url=${APP_BASE_URL:http://localhost:8080}

# JWT — valeur définie dans les variables d'environnement
jwt.secret=${JWT_SECRET}

# Désactiver l'autoconfiguration du UserDetailsService par défaut (on utilise JWT custom)
spring.autoconfigure.exclude=org.springframework.boot.security.servlet.autoconfigure.UserDetailsServiceAutoConfiguration